name: CI Checks & Tests

on:
  push:
    branches: ["main","staging"]
  pull_request:
    branches: ["main","staging"]

jobs:
  # 1. Frontend Job: Lints and builds the React app
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Frontend Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint
        
      - name: Build Application
        run: npm run build

  # 2. Backend Job: Sets up Postgres, runs migrations, and executes tests
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    # Set up a background PostgreSQL database for the tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: codemesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install Backend Dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/codemesh?schema=public
          
      - name: Start Backend Server
        # The '&' runs it in the background so tests can run in the next step
        run: npm start > server.log 2>&1 &
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/codemesh?schema=public
          PORT: 5000
          JWT_SECRET: "test_secret_key"
          
      - name: Wait for server to start
        run: npx --yes wait-on -t 15000 http://localhost:5000/health || (cat server.log && exit 1)
        
      - name: Run Backend Tests
        run: npm test
